services:
  # ---------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------
  postgres:
    image: dhi.io/postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - db_net # Isolated network, no direct Nginx/external cluster access

  redis:
    image: dhi.io/redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - cluster_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - cluster_net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    restart: unless-stopped
    networks:
      - cluster_net

  # ---------------------------------------------
  # MICROSERVICES
  # ---------------------------------------------
  order_service:
    build:
      context: ./order_service
    container_name: order_service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/orders_db
      - KAFKA_BROKER=kafka:29092
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=master
    depends_on:
      - postgres
      - kafka
      - keycloak
    networks:
      - cluster_net
      - db_net # Peered into DB network to talk to Postgres

  inventory_service:
    build:
      context: ./inventory_service
    container_name: inventory_service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/orders_db
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - cluster_net
      - db_net # Peered into DB network

  notification_service:
    build:
      context: ./notification_service
    container_name: notification_service
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - kafka
      - redis
    networks:
      - cluster_net

  # ---------------------------------------------
  # FRONTEND (Build Stage)
  # ---------------------------------------------
  frontend:
    build:
      context: ./frontend
    container_name: frontend_build
    volumes:
      - frontend_dist:/app/dist

  # ---------------------------------------------
  # EDGE PROXY / API GATEWAY
  # ---------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - order_service
      - inventory_service
      - keycloak
    networks:
      - cluster_net
      # Nginx does NOT have access to db_net. 

networks:
  cluster_net:
    driver: bridge
  db_net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  frontend_dist:
