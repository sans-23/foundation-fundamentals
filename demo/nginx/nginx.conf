events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # MIME types for serving static files correctly
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate Limiting Zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # Rate limiting on all API routes
        limit_req zone=api_limit burst=20 nodelay;

        # Route to Order Service
        location /api/orders {
            proxy_pass http://order_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Inventory Service
        location /api/inventory {
            proxy_pass http://inventory_service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Auth / Keycloak
        location /auth/ {
            proxy_pass http://keycloak:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve Frontend SPA (catch-all)
        # This MUST be the last location block.
        # try_files attempts to serve the requested file, and if not found,
        # falls back to index.html (required for client-side routing).
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
